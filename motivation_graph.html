const META={"davidgoggins_DN3h0304juE": {"c": "MINDSET / PHILOSOPHY", "k": "Pre-fatigue the back with light rear delts, then do 100 pull-ups as five every 30 seconds.", "t": "Do five pull-ups every 30 seconds to hit 100 in 10 minutes.", "s": "Action", "st": ["Momentum & small wins"], "sid": ["S11"]}, "DZ5sIrlNs2k": {"c": "MINDSET / PHILOSOPHY", "k": "Vividly glimpsing your next-level self makes your current life suddenly feel too small to stay in.", "t": "", "s": "Contemplation", "st": ["Vision clarity", "Identity-based"], "sid": ["S15", "S2"]}, "hubermanlab_DYfNEVVh78j": {"c": "MINDSET / PHILOSOPHY", "k": "Happiness fades like a leaky tire, so build well-being by creating good moments repeatedly.", "t": "Look for small chances to connect and create good moments daily.", "s": "Maintenance", "st": ["Momentum & small wins"], "sid": ["S11"]}, "hubermanlab_DZVhIWNyTWb": {"c": "MINDSET / PHILOSOPHY", "k": "Short sleep disrupts hunger hormones, leading women to eat about 300 extra calories.", "t": "Sleep at least seven and a half hours to avoid hormone-driven overeating.", "s": "Action", "st": ["Rest & recovery"], "sid": ["S7"]}, "lemuelmcd_DZDsBUDnfUN": {"c": "MINDSET / PHILOSOPHY", "k": "Spending the after-work window screen-free lets your nervous system actually close the workday.", "t": "After work, spend 20 minutes with no screen: walk or sit outside.", "s": "Action", "st": ["Rest & recovery", "Attention & focus"], "sid": ["S7", "S6"]}, "notirene.exe_DU5eSyyCDSg": {"c": "MINDSET / PHILOSOPHY", "k": "Repeated thoughts and emotions shape your reality, so guard what you rehearse mentally.", "t": "Catch a repeated negative thought and stop rehearsing it.", "s": "Contemplation", "st": ["Attention & focus"], "sid": ["S6"]}, "notirene.exe_DVgbLSviJlk": {"c": "MINDSET / PHILOSOPHY", "k": "Music bypasses logic and physically rearranges your emotional and bodily state.", "t": "", "s": "Contemplation", "st": ["Environment design"], "sid": ["S3"]}, "notirene.exe_DWbO_5TiLud": {"c": "MINDSET / PHILOSOPHY", "k": "You forgive others easily yet carry brutal self-hatred you actually deserve to release.", "t": "", "s": "Contemplation", "st": ["Anti-shame"], "sid": ["S14"]}, "notirene.exe_DZhM_FloaBC": {"c": "MINDSET / PHILOSOPHY", "k": "Your self-image is the story you have repeated longest, not the actual truth.", "t": "", "s": "Contemplation", "st": ["Identity-based"], "sid": ["S2"]}, "notirene.exe_DZUjVxLolrc": {"c": "MINDSET / PHILOSOPHY", "k": "You stay busy with easy tasks to avoid the one change that would matter.", "t": "Name the one task you keep avoiding and do it first today.", "s": "Preparation", "st": ["Attention & focus"], "sid": ["S6"]}, "theflintmind_DaA_WQwtozN": {"c": "MINDSET / PHILOSOPHY", "k": "Growth is not escaping challenges but becoming someone who handles bigger ones without losing themselves.", "t": "", "s": "Maintenance", "st": ["Embrace discomfort", "Identity-based"], "sid": ["S8", "S2"]}, "davidgoggins_DP1n5qeEWXg": {"c": "IF-THEN PLANS", "k": "With the right support and grit, you can finish even as your body shuts down.", "t": "", "s": "Contemplation", "st": ["Embrace discomfort", "Accountability"], "sid": ["S8", "S12"]}, "davidgoggins_DP6-w81Eowa": {"c": "IF-THEN PLANS", "k": "At any age or injury you must find your new 100% and refuse to quit.", "t": "Define your current 100% given your age and condition, then give it.", "s": "Action", "st": ["Minimum floor", "Embrace discomfort"], "sid": ["S1", "S8"]}, "davidgoggins_DQ4j-WkEQKj": {"c": "IF-THEN PLANS", "k": "Living comfortably without ever chasing your potential leaves you feeling empty at the end.", "t": "", "s": "Contemplation", "st": ["Away-motivation", "Embrace discomfort"], "sid": ["S10", "S8"]}, "DZvCUhSoh0_": {"c": "IF-THEN PLANS", "k": "A three-question journaling exercise builds direction, purpose, and vision when you feel clueless.", "t": "Journal: what blocks your growth, what you'd try if you couldn't fail, one step tomorrow.", "s": "Preparation", "st": ["Vision clarity", "If-then plans"], "sid": ["S15", "S4"]}, "hubermanlab_DYxNh3rhsep": {"c": "IF-THEN PLANS", "k": "Split a workout across days when life or low energy demands it, since effort matters more than load.", "t": "When too drained, do half your workout and finish the rest another day.", "s": "Action", "st": ["Minimum floor", "No zero days"], "sid": ["S1", "S9"]}, "jayshetty_DaDk0tgh2yp": {"c": "IF-THEN PLANS", "k": "Small unexamined default choices quietly compound and shape the direction of your life.", "t": "Before deciding, ask what makes most sense for you now, not what's easiest.", "s": "Preparation", "st": ["Long game", "Environment design"], "sid": ["S13", "S3"]}, "jayshetty_DZ-GbzsuuYx": {"c": "IF-THEN PLANS", "k": "Judging yourself by others' standards makes you feel stupid; your authentic self is what's wanted.", "t": "", "s": "Contemplation", "st": ["Identity-based", "Anti-shame"], "sid": ["S2", "S14"]}, "lemuelmcd_DA1sTgGCSqd": {"c": "IF-THEN PLANS", "k": "Progress comes from tolerating boredom instead of chasing constant dopamine from scrolling.", "t": "Do your most important work first thing before any scrolling.", "s": "Action", "st": ["Embrace discomfort", "Attention & focus"], "sid": ["S8", "S6"]}, "lemuelmcd_DBCsfX-JNQ-": {"c": "IF-THEN PLANS", "k": "Defining the life you'd hate motivates more powerfully than vague big dreams.", "t": "Write out who and what life you would hate to become.", "s": "Contemplation", "st": ["Away-motivation"], "sid": ["S10"]}, "lemuelmcd_DX-KetlF6Jj": {"c": "IF-THEN PLANS", "k": "Evening collapse is a predictable reflexive phone-to-guilt sequence, not a discipline failure.", "t": "Seal your environment before finishing your last work obligation.", "s": "Preparation", "st": ["Environment design", "Anti-shame"], "sid": ["S3", "S14"]}, "lemuelmcd_DX3HEvZlDf7": {"c": "IF-THEN PLANS", "k": "Delaying goals is like snoozing; they keep draining you and restarts grow heavier.", "t": "Start the goal now instead of deferring it to next week.", "s": "Preparation", "st": ["Momentum & small wins"], "sid": ["S11"]}, "lemuelmcd_DX4PMVWFehQ": {"c": "IF-THEN PLANS", "k": "Starting on a depleted brain works by shrinking the task and removing decisions.", "t": "Commit to just 10 minutes on the lowest-friction first step.", "s": "Action", "st": ["Minimum floor", "Environment design"], "sid": ["S1", "S3"]}, "lemuelmcd_DX5Azg4juwn": {"c": "IF-THEN PLANS", "k": "A simple sustainable system rebuilds self-trust faster than chasing perfect output.", "t": "Build one unbroken week with a system simple enough to sustain.", "s": "Action", "st": ["Systems over goals"], "sid": ["S5"]}, "lemuelmcd_DXwb0Q8iTa0": {"c": "IF-THEN PLANS", "k": "Readiness and focus arrive after you start, not before you begin.", "t": "Start the work first; stop waiting to feel ready.", "s": "Action", "st": ["Momentum & small wins"], "sid": ["S11"]}, "lemuelmcd_DY-iRsNDiy-": {"c": "IF-THEN PLANS", "k": "Willpower depletes like a muscle, so evening burnout is biology, not laziness.", "t": "Pre-make tomorrow's choices the night before to save willpower.", "s": "Contemplation", "st": ["Environment design", "Anti-shame"], "sid": ["S3", "S14"]}, "lemuelmcd_DY0PQMFCVAF": {"c": "IF-THEN PLANS", "k": "Unfinished mental threads called attention residue quietly drain focus between tasks.", "t": "Close open work loops before switching to your evening project.", "s": "Contemplation", "st": ["Attention & focus"], "sid": ["S6"]}, "lemuelmcd_DY2z7tpCvxR": {"c": "IF-THEN PLANS", "k": "Closing the workday, a transition ritual, and a tiny entry point protect evening focus.", "t": "Before leaving work, write what's done, what's open, and tomorrow's first task.", "s": "Preparation", "st": ["Attention & focus", "If-then plans"], "sid": ["S6", "S4"]}, "lemuelmcd_DY5Y1TFDXTd": {"c": "IF-THEN PLANS", "k": "Consistency comes from a frictionless designed path, not from more willpower.", "t": "Pre-define the task and seal your environment before you sit.", "s": "Preparation", "st": ["Environment design"], "sid": ["S3"]}, "lemuelmcd_DYafJbHgNXa": {"c": "IF-THEN PLANS", "k": "Everyday distractions mimic a sabotage manual that makes execution feel impossible.", "t": "Turn off notifications and close the tab you open before starting.", "s": "Preparation", "st": ["Environment design", "Attention & focus"], "sid": ["S3", "S6"]}, "lemuelmcd_DYdD98KmkkP": {"c": "IF-THEN PLANS", "k": "Repeated restarts signal desire, not failure; what's missing is a continuation system.", "t": "Build a system for the moment after the first disruption.", "s": "Contemplation", "st": ["No zero days", "Systems over goals"], "sid": ["S9", "S5"]}, "lemuelmcd_DYF42niDhpM": {"c": "IF-THEN PLANS", "k": "Small reflexive habits like checking your phone before deciding tasks silently wreck focus.", "t": "Name your first priority before sitting down or touching your phone.", "s": "Action", "st": ["Attention & focus", "Environment design"], "sid": ["S6", "S3"]}, "lemuelmcd_DYIdm92k5Lz": {"c": "IF-THEN PLANS", "k": "Endless planning never closes the gap; clarity only appears once you start moving.", "t": "Stop refining the plan and take one real action today.", "s": "Preparation", "st": ["Momentum & small wins"], "sid": ["S11"]}, "lemuelmcd_DYiNlWWD2xM": {"c": "IF-THEN PLANS", "k": "Attention determines what exists for you; misdirected focus hides what matters most.", "t": "Audit where your attention points and redirect it to priorities.", "s": "Contemplation", "st": ["Attention & focus"], "sid": ["S6"]}, "lemuelmcd_DYkycQXiczu": {"c": "IF-THEN PLANS", "k": "Self-trust is rebuilt through small kept promises, not bigger commitments.", "t": "Make and keep one small promise to yourself each day.", "s": "Action", "st": ["Momentum & small wins", "Identity-based"], "sid": ["S11", "S2"]}, "lemuelmcd_DYLCZBJlwoa": {"c": "IF-THEN PLANS", "k": "Morning snoozing is fixed upstream by a consistent sleep schedule, not the alarm.", "t": "Make sleep non-negotiable and leave work on time to protect it.", "s": "Action", "st": ["Rest & recovery"], "sid": ["S7"]}, "lemuelmcd_DYNnSUyiciP": {"c": "IF-THEN PLANS", "k": "Having no priority set before sitting down is the gap every distraction exploits.", "t": "Set your single priority before you sit down to work.", "s": "Action", "st": ["If-then plans", "Attention & focus"], "sid": ["S4", "S6"]}, "lemuelmcd_DYnXMVgkl84": {"c": "IF-THEN PLANS", "k": "Phones are engineered like casinos to keep you in; counter-design your own environment.", "t": "Phone in another room, notifications off, one tab, clear desk.", "s": "Preparation", "st": ["Environment design"], "sid": ["S3"]}, "lemuelmcd_DYp74DtjsAJ": {"c": "IF-THEN PLANS", "k": "True rest restores focus without costing attention; walking beats scrolling for recovery.", "t": "Replace post-work scrolling with a screen-free walk.", "s": "Action", "st": ["Rest & recovery"], "sid": ["S7"]}, "lemuelmcd_DYQMIJRl-sx": {"c": "IF-THEN PLANS", "k": "Tomorrow's execution is set tonight by sealing today's session, not by the morning.", "t": "Each night write tomorrow's one outcome and prep your environment.", "s": "Preparation", "st": ["Environment design", "If-then plans"], "sid": ["S3", "S4"]}, "lemuelmcd_DYw1nnEAX4g": {"c": "IF-THEN PLANS", "k": "Programs fail because they're built for best days, not the hard, tired ones.", "t": "Build a minimum floor protocol for your worst evenings.", "s": "Contemplation", "st": ["Minimum floor"], "sid": ["S1"]}, "lemuelmcd_DYw2QqUtyQD": {"c": "IF-THEN PLANS", "k": "Side projects compete against a brain drained by an invisible cognitive second shift.", "t": "Install a transition ritual signaling your second shift begins now.", "s": "Contemplation", "st": ["If-then plans", "Rest & recovery"], "sid": ["S4", "S7"]}, "lemuelmcd_DYX6U-7G48V": {"c": "IF-THEN PLANS", "k": "The best habits are those that survive your worst morning with zero willpower.", "t": "Keep your phone out of your bedroom, decided the night before.", "s": "Action", "st": ["Minimum floor", "Environment design"], "sid": ["S1", "S3"]}, "lemuelmcd_DYzYWgsAF_f": {"c": "IF-THEN PLANS", "k": "Constant checking, double-speed viewing, and discomfort with silence signal stimulation addiction.", "t": "Tally your stimulation-addiction signs and lock in if over five.", "s": "Precontemplation", "st": ["Embrace discomfort", "Attention & focus"], "sid": ["S8", "S6"]}, "lemuelmcd_DZ-6PAajjzd": {"c": "IF-THEN PLANS", "k": "Overcomplicated productivity systems get abandoned; simple ones that fit your life compound.", "t": "Choose a system you can run in 5 to 10 minutes daily.", "s": "Contemplation", "st": ["Systems over goals", "Long game"], "sid": ["S5", "S13"]}, "lemuelmcd_DZ5wqn9Elxe": {"c": "IF-THEN PLANS", "k": "Sleep is the multiplier that makes every other self-improvement habit perform better.", "t": "Prioritize sleep over adding more self-improvement habits.", "s": "Contemplation", "st": ["Rest & recovery"], "sid": ["S7"]}, "lemuelmcd_DZa3BnkjDIC": {"c": "IF-THEN PLANS", "k": "Winners build repeatable systems while losers chase one-time outcomes.", "t": "Build infrastructure that makes results repeatable, not one launch.", "s": "Contemplation", "st": ["Systems over goals"], "sid": ["S5"]}, "lemuelmcd_DZBHDomDoOr": {"c": "IF-THEN PLANS", "k": "A routine that conflicts with your real life breeds avoidance, not consistency.", "t": "Strip your routine to sustainable basics built around your real life.", "s": "Action", "st": ["Systems over goals", "Minimum floor"], "sid": ["S5", "S1"]}, "lemuelmcd_DZGQzh0jzWj": {"c": "IF-THEN PLANS", "k": "We over-promise because future-self feels rested; design instead for the depleted you.", "t": "Plan your evening for the exhausted version who actually arrives home.", "s": "Contemplation", "st": ["Minimum floor"], "sid": ["S1"]}, "lemuelmcd_DZgRuXJjy6Y": {"c": "IF-THEN PLANS", "k": "Prep rituals like new apps and reorganizing desks are procrastination disguised as progress.", "t": "Skip the setup rituals and start the actual task now.", "s": "Action", "st": ["Momentum & small wins"], "sid": ["S11"]}, "lemuelmcd_DZI1iA_EqVT": {"c": "IF-THEN PLANS", "k": "Discipline asks how to force yourself; design makes the work impossible to avoid.", "t": "Pre-schedule the block and pre-set the environment to remove decisions.", "s": "Action", "st": ["Environment design", "If-then plans"], "sid": ["S3", "S4"]}, "lemuelmcd_DZilXhnjmvF": {"c": "IF-THEN PLANS", "k": "Behavior needs motivation, ability, and prompt aligned; fix prompt and friction, not motivation.", "t": "Install a specific time-trigger, then pre-decide to cut friction.", "s": "Preparation", "st": ["If-then plans", "Environment design"], "sid": ["S4", "S3"]}, "lemuelmcd_DZLaWY0D_sn": {"c": "IF-THEN PLANS", "k": "The 90 seconds after walking in default your evening unless you pre-design them.", "t": "Pre-plan exactly what you'll do in the first 90 seconds home.", "s": "Preparation", "st": ["If-then plans"], "sid": ["S4"]}, "lemuelmcd_DZnu8dAlEMf": {"c": "IF-THEN PLANS", "k": "Advice that works is built for your worst day; design environment over willpower.", "t": "Design your environment so the right behavior is the easiest one.", "s": "Action", "st": ["Minimum floor", "Environment design"], "sid": ["S1", "S3"]}, "lemuelmcd_DZqanRZiTfi": {"c": "IF-THEN PLANS", "k": "Build systems for your indifferent worst days, since motivation is unreliable.", "t": "Pre-set task, time, and environment so willpower isn't needed.", "s": "Preparation", "st": ["Minimum floor", "Environment design"], "sid": ["S1", "S3"]}, "lemuelmcd_DZQpzkxEvgh": {"c": "IF-THEN PLANS", "k": "Lost focus leaks from work-to-life transitions and environment, not the phone or routine you blame.", "t": "Audit where your focus actually leaks instead of blocking apps.", "s": "Contemplation", "st": ["Attention & focus", "Environment design"], "sid": ["S6", "S3"]}, "lemuelmcd_DZvdldVER8I": {"c": "IF-THEN PLANS", "k": "A scattered mind reflects a fragmented environment, not weak willpower; fix the room, not your focus.", "t": "Close every tab, put phone in another room, write one task before starting.", "s": "Action", "st": ["Environment design", "Attention & focus"], "sid": ["S3", "S6"]}, "lemuelmcd_DZVT7jlDjvS": {"c": "IF-THEN PLANS", "k": "You always have the time; tight constraints prove it, what's missing is willingness to use it efficiently.", "t": "Stop claiming no time and do ten minutes of the task now.", "s": "Contemplation", "st": ["Momentum & small wins"], "sid": ["S11"]}, "lemuelmcd_DZyCLCfnEnX": {"c": "IF-THEN PLANS", "k": "Evening focus fails from a depleted brain, no transition ritual, and waiting for readiness instead of designing it.", "t": "Install an evening reset ritual and write your first step before sitting down.", "s": "Preparation", "st": ["If-then plans", "Minimum floor"], "sid": ["S4", "S1"]}, "mattdavella_DIOgnPRTNYg": {"c": "IF-THEN PLANS", "k": "The five-minute rule beats procrastination because starting, not doing, is the hardest part.", "t": "Set a timer and commit to just five minutes on the task.", "s": "Action", "st": ["Momentum & small wins"], "sid": ["S11"]}, "mattdavella_DIVS8AKRhBs": {"c": "IF-THEN PLANS", "k": "Daily beginner yoga builds flexibility, balance, and calm; start basic, not with advanced poses.", "t": "Roll out a mat and try a 20-minute beginner yoga routine.", "s": "Action", "st": ["Minimum floor"], "sid": ["S1"]}, "mattdavella_DIYwW0qRNUR": {"c": "IF-THEN PLANS", "k": "Chronotypes are largely genetic; the best schedule fits your natural type, not your willpower.", "t": "Build your schedule around your chronotype instead of forcing the opposite.", "s": "Contemplation", "st": ["Rest & recovery", "Environment design"], "sid": ["S7", "S3"]}, "mattdavella_DKvHkfMz97n": {"c": "IF-THEN PLANS", "k": "Social algorithms serve the platform and advertisers by converting attention into revenue, not creators.", "t": "", "s": "Contemplation", "st": ["Attention & focus"], "sid": ["S6"]}, "notirene.exe_DTr_MikCAxx": {"c": "IF-THEN PLANS", "k": "Chronic exhaustion comes from never setting yourself down, performing constantly even when alone.", "t": "", "s": "Contemplation", "st": ["Rest & recovery"], "sid": ["S7"]}, "notirene.exe_DWBVaPkCAuD": {"c": "IF-THEN PLANS", "k": "Your capacity for good is tied to facing your darkness; integrate both rather than denying either.", "t": "", "s": "Contemplation", "st": ["Embrace discomfort"], "sid": ["S8"]}, "notirene.exe_DYULekgoRlK": {"c": "IF-THEN PLANS", "k": "Late-night scrolling makes you feel behind; ask if you want their life or just relief from lateness.", "t": "Ask whether you actually want their life or just to stop feeling behind.", "s": "Contemplation", "st": ["Vision clarity"], "sid": ["S15"]}, "notirene.exe_DZ37th8offO": {"c": "IF-THEN PLANS", "k": "Many thoughts are symptoms of an unlived life; some problems must be lived through, not analyzed.", "t": "Live through the parts of life you've avoided instead of over-analyzing feelings.", "s": "Contemplation", "st": ["Embrace discomfort"], "sid": ["S8"]}, "notirene.exe_DZrdBCToD4p": {"c": "IF-THEN PLANS", "k": "Rewards without the journey teach your brain to want things without ever moving toward them.", "t": "Reconnect desire to effort by pursuing real experiences, not simulations.", "s": "Contemplation", "st": ["Embrace discomfort"], "sid": ["S8"]}, "notirene.exe_DZZZ-8zoESc": {"c": "IF-THEN PLANS", "k": "You compare your real life to frozen idealized selves that never aged or failed, an unfair comparison.", "t": "", "s": "Contemplation", "st": ["Anti-shame"], "sid": ["S14"]}, "theflintmind_DaA9F0_tyWB": {"c": "IF-THEN PLANS", "k": "Don't ask if life gets easier; ask if you're becoming more capable, that's what changes your future.", "t": "Ask whether you're becoming more capable instead of whether life gets easier.", "s": "Contemplation", "st": ["Identity-based", "Embrace discomfort"], "sid": ["S2", "S8"]}, "theflintmind_DaBpth8tHm6": {"c": "IF-THEN PLANS", "k": "Transformation comes from trusting your ability to work things out, not from needing guarantees.", "t": "", "s": "Contemplation", "st": ["Long game"], "sid": ["S13"]}, "theflintmind_DaC0mjsNBuj": {"c": "IF-THEN PLANS", "k": "Your next chapter is reunion, not reinvention; make room for the habits and ambition already in you.", "t": "Reintroduce one habit that used to make you feel alive.", "s": "Preparation", "st": ["Identity-based"], "sid": ["S2"]}, "theflintmind_DaCyHMJthsH": {"c": "IF-THEN PLANS", "k": "You didn't lose yourself; you abandoned parts of you to survive a season, buried not broken.", "t": "", "s": "Contemplation", "st": ["Anti-shame", "Identity-based"], "sid": ["S14", "S2"]}, "theflintmind_DaDlfUyNyCN": {"c": "IF-THEN PLANS", "k": "Waiting for certainty is the real risk; you need self-trust that you'll adapt, learn, and find another path.", "t": "Act without certainty, trusting you'll adapt if things change.", "s": "Preparation", "st": ["Embrace discomfort", "Long game"], "sid": ["S8", "S13"]}, "davidgoggins_DQ2AqUCkQHt": {"c": "PROCESS / DISCIPLINE", "k": "Consistent daily training over 100 days, adjusting around injury instead of quitting, compounds into extraordinary results.", "t": "Train daily and adjust your method around setbacks instead of stopping.", "s": "Maintenance", "st": ["Long game", "No zero days"], "sid": ["S13", "S9"]}, "lemuelmcd_DYAvU3iigv2": {"c": "PROCESS / DISCIPLINE", "k": "Perfectionism collapses when one variable breaks; sustainable minimums you keep on bad days compound instead.", "t": "Replace perfect standards with a 20-minute minimum you can sustain daily.", "s": "Maintenance", "st": ["Minimum floor", "No zero days"], "sid": ["S1", "S9"]}, "lemuelmcd_DYfoy1mEvys": {"c": "PROCESS / DISCIPLINE", "k": "Small wins like phone outside the bedroom and one written priority compound into genuine focus.", "t": "Charge your phone outside the bedroom and write one priority before opening anything.", "s": "Action", "st": ["Momentum & small wins", "Environment design"], "sid": ["S11", "S3"]}, "lemuelmcd_DYVVoqPDZHX": {"c": "PROCESS / DISCIPLINE", "k": "Force has a daily limit; engineer an environment where the work is easier to do than to avoid.", "t": "Remove friction beforehand: phone away, outcome written, environment sealed before you start.", "s": "Action", "st": ["Environment design"], "sid": ["S3"]}, "lemuelmcd_DZs4sd5jFMy": {"c": "PROCESS / DISCIPLINE", "k": "Discipline is refusing to drop below a non-negotiable floor on bad days, not going harder on good ones.", "t": "Set a 10-minute daily floor that happens no matter how bad the day.", "s": "Action", "st": ["Minimum floor"], "sid": ["S1"]}, "lemuelmcd_DZYZC4Ck_sd": {"c": "PROCESS / DISCIPLINE", "k": "Removing friction beforehand beats every procrastination fix; the cost was always the first step.", "t": "Write tomorrow's task and set up your environment the night before.", "s": "Action", "st": ["Environment design"], "sid": ["S3"]}, "mattdavella_DIbW5_uxWrg": {"c": "PROCESS / DISCIPLINE", "k": "Tracking every activity for 30 days exposes where your hours actually go and enables intentional change.", "t": "Track every daily activity for 30 days using a time-tracking app like Toggl.", "s": "Contemplation", "st": ["Systems over goals"], "sid": ["S5"]}, "mattdavella_DIWO__rRam4": {"c": "PROCESS / DISCIPLINE", "k": "Tracking daily mood reveals that simple pleasures, not big achievements, drive lasting happiness.", "t": "Rate your mood each night to spot what genuinely makes you happy.", "s": "Contemplation", "st": ["Systems over goals"], "sid": ["S5"]}, "lemuelmcd_DaBfH7vje_Y": {"c": "SHAME / FEAR HOOK", "k": "\"I'm too tired\" is a thought your body obeys; separate the real depletion from the story.", "t": "When too tired, commit to just 10 minutes and let your biology catch up.", "s": "Action", "st": ["Minimum floor"], "sid": ["S1"]}, "lemuelmcd_DY79hgNjaWM": {"c": "SHAME / FEAR HOOK", "k": "Distractions cost differently; email checks and lyric music drain deep work more than they appear to.", "t": "Use brown noise or silence and cut lyrics and notifications during deep work.", "s": "Action", "st": ["Attention & focus"], "sid": ["S6"]}, "lemuelmcd_DYDUGibjrVo": {"c": "SHAME / FEAR HOOK", "k": "Momentum breaks from undefined next sessions, unrecovered misses, and high stimulation before deep work.", "t": "Before closing a session, write one sentence defining what the next one is for.", "s": "Maintenance", "st": ["Attention & focus", "Momentum & small wins"], "sid": ["S6", "S11"]}, "lemuelmcd_DYSw1YFmm7w": {"c": "SHAME / FEAR HOOK", "k": "Self-improvement programs fail because they have no recovery protocol for depleted, disrupted days.", "t": "Pick systems with a low floor and a recovery protocol that activates the day after a miss.", "s": "Maintenance", "st": ["No zero days", "Minimum floor"], "sid": ["S9", "S1"]}, "lemuelmcd_DZ0m9cKjGjX": {"c": "SHAME / FEAR HOOK", "k": "Compulsive scrolling is a symptom; the real disease is having no bridge between work mode and personal mode.", "t": "Diagnose what you are escaping instead of just deleting apps.", "s": "Contemplation", "st": ["Attention & focus"], "sid": ["S6"]}, "lemuelmcd_DZ8VciLDrMa": {"c": "SHAME / FEAR HOOK", "k": "Your evening collapse into scrolling is a conditioned Pavlovian response, not a lack of discipline.", "t": "Notice the trigger pulling you before you respond to it automatically.", "s": "Contemplation", "st": ["If-then plans", "Attention & focus"], "sid": ["S4", "S6"]}, "lemuelmcd_DZdb5QMAEip": {"c": "SHAME / FEAR HOOK", "k": "Lost evenings come from having no protocol to transition out of work mode, not from laziness.", "t": "Build a transition ritual that bridges work mode and personal mode after 5pm.", "s": "Contemplation", "st": ["If-then plans", "Environment design"], "sid": ["S4", "S3"]}, "notirene.exe_DTNb1-ciG25": {"c": "SHAME / FEAR HOOK", "k": "Constantly consuming content while alone is avoidance of being alone with your own thoughts.", "t": "Eat one meal with no screen and sit with your thoughts.", "s": "Contemplation", "st": ["Embrace discomfort", "Attention & focus"], "sid": ["S8", "S6"]}, "notirene.exe_DWGu5MuiHfR": {"c": "SHAME / FEAR HOOK", "k": "Inability to focus on your \"shoulds\" while focusing easily on what you love may signal the wrong life.", "t": "", "s": "Contemplation", "st": ["Vision clarity"], "sid": ["S15"]}, "notirene.exe_DXCXumWiLg_": {"c": "SHAME / FEAR HOOK", "k": "Feeling stuck is your ego rejecting the present; suffering lives in resisting reality, not reality itself.", "t": "", "s": "Contemplation", "st": ["Embrace discomfort"], "sid": ["S8"]}, "notirene.exe_DZCZZx8o-f-": {"c": "SHAME / FEAR HOOK", "k": "Growth means becoming less attached to who you were, not renovating outdated identities.", "t": "Identify one outdated self-identity and let it go.", "s": "Contemplation", "st": ["Identity-based"], "sid": ["S2"]}, "DZV4oBYtiOj": {"c": "IDENTITY SHIFT", "k": "Repeated hesitation trains your identity around delay; keeping your word rebuilds self-trust and momentum.", "t": "Keep small promises to yourself so your word still means movement.", "s": "Action", "st": ["Identity-based", "Momentum & small wins"], "sid": ["S2", "S11"]}, "lemuelmcd_DZ3LwzPAPxt": {"c": "IDENTITY SHIFT", "k": "One consistent action builds identity, and lasting change comes from low-friction systems, not motivation.", "t": "Start one consistent keystone habit to build identity momentum.", "s": "Action", "st": ["Identity-based", "Systems over goals"], "sid": ["S2", "S5"]}, "notirene.exe_DUQwdIMiPfX": {"c": "IDENTITY SHIFT", "k": "Familiar pain feels safer than peace because you don't yet know who you are without the damage.", "t": "", "s": "Contemplation", "st": ["Identity-based"], "sid": ["S2"]}, "notirene.exe_DUu4fF0CHPq": {"c": "IDENTITY SHIFT", "k": "Repeated exposure to dark content normalizes it through your nervous system rather than informing you.", "t": "Limit consuming violent or dark content to protect your inner world.", "s": "Action", "st": ["Environment design"], "sid": ["S3"]}, "theflintmind_DaC2NPENjvC": {"c": "IDENTITY SHIFT", "k": "You don't need to search for yourself; stop believing you're gone, since the old fire returns with new wisdom.", "t": "", "s": "Contemplation", "st": ["Identity-based"], "sid": ["S2"]}, "theflintmind_DYk9xRXtq0H": {"c": "IDENTITY SHIFT", "k": "Letting others' doubt and noise into your mental space fractures fragile flow and kills momentum.", "t": "Limit who can access your mental space while building something important.", "s": "Action", "st": ["Attention & focus"], "sid": ["S6"]}, "mattdavella_DId7GjbRzN3": {"c": "ACHIEVEMENT PROOF", "k": "Daily mobility training strengthens joints, restores lost range of motion, and improves how you move.", "t": "Do daily mobility drills for knees, hips, shoulders, and spine.", "s": "Action", "st": ["Rest & recovery"], "sid": ["S7"]}};

  physics:{barnesHut:{gravitationalConstant:-3400,centralGravity:.18,springLength:110,springConstant:.035,damping:.55,avoidOverlap:.5},
           stabilization:{iterations:300}},
  interaction:{hover:true,tooltipDelay:120}
});
const off=new Set();
function toggle(btn){const s=btn.dataset.s;btn.classList.toggle('off');
  off.has(s)?off.delete(s):off.add(s);applyFilter(curQ);}
let curQ='';
function applyFilter(q){q=(q||'').toLowerCase();curQ=q;
  nodes.forEach(n=>{
    if(n.kind==='hub'){nodes.update({id:n.id,hidden:off.has(n.id)});return;}
    const m=META[n.id];if(!m)return;
    const allStratOff=m.sid.length>0 && m.sid.every(s=>off.has(s));
    const hideByQ=q && !((m.k+' '+m.t).toLowerCase().includes(q));
    nodes.update({id:n.id,hidden:allStratOff||hideByQ});
  });}
function search(v){applyFilter(v);}
net.on('click',p=>{if(!p.nodes.length){hidePanel();return;}
  const id=p.nodes[0];
  if(HUB[id]){showHub(id);}else{showReel(id);}
  net.selectNodes([id]);});
function showReel(id){const m=META[id];if(!m)return;
  pc.textContent=m.c;ps.textContent=m.s?('TTM stage · '+m.s):'';
  pk.textContent=m.k;pt.textContent=m.t?('▸ DO: '+m.t):'';pt.style.display=m.t?'block':'none';
  document.getElementById('ptags').innerHTML=(m.st||[]).map(x=>`<span class="ptag">${x}</span>`).join('');
  document.getElementById('panel').style.display='block';}
function showHub(id){const h=HUB[id];
  pc.textContent='STRATEGY · '+h.n+' reels';ps.textContent='';
  pk.textContent=h.name;pt.textContent=h.desc;pt.style.display='block';
  document.getElementById('ptags').innerHTML='';
  document.getElementById('panel').style.display='block';}
function hidePanel(){document.getElementById('panel').style.display='none';net.unselectAll();}
