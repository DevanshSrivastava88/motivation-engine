              // â”€â”€ Panel logic â”€â”€
              function showPanel(nodeId) {
                  var node = nodes.get(nodeId);
                  if (!node) return;
                  var color = node.color || '#888888';
                  var meta = clusterMeta[color] || { name: 'Unknown', desc: '' };

                  document.getElementById('panel-node-name').textContent = nodeId;
                  document.getElementById('panel-node-name').style.color = color === '#c7ff38' ? '#c7ff38' : color;

                  var tag = document.getElementById('panel-cluster-tag');
                  tag.textContent = meta.name;
                  tag.style.color = color;
                  tag.style.borderColor = color;

                  document.getElementById('panel-tooltip').textContent = node.title || '';

                  var nd = nodeAnalysis[nodeId];
                  var analysisHTML;
                  if (nd && typeof nd === 'object') {
                      var urgencyColor = { critical: '#ff4444', high: '#ff9900', medium: '#e8c840', low: '#888888' }[nd.urgency] || '#888';
                      var urgencyBg = { critical: 'rgba(255,68,68,0.12)', high: 'rgba(255,153,0,0.12)', medium: 'rgba(232,200,64,0.12)', low: 'rgba(136,136,136,0.12)' }[nd.urgency] || 'rgba(136,136,136,0.1)';
                      analysisHTML =
                          '<div class="ph-label">WHAT THIS REVEALS</div>' +
                          '<div class="ph-text">' + nd.learning + '</div>' +
                          '<div style="margin:10px 0 4px"><span class="urgency-badge" style="background:' + urgencyBg + ';color:' + urgencyColor + ';border:1px solid ' + urgencyColor + '55">' + nd.urgency.toUpperCase() + '</span></div>' +
                          '<div class="ph-label">ACT NOW</div>' +
                          '<div class="act-list">' +
                          nd.actions.map(function(a, i) {
                              return '<label class="act-item"><input type="checkbox"><span>' + (i+1) + '. ' + a + '</span></label>';
                          }).join('') +
                          '</div>' +
                          '<div class="ph-quote">â€œ' + nd.quote + 'â€</div>';
                  } else {
                      analysisHTML = '<span style="color:#666;font-size:11px">' + (nd || ('Part of the ' + meta.name + ' cluster â€” ' + meta.desc)) + '</span>';
                  }
                  document.getElementById('panel-analysis-text').innerHTML = analysisHTML;

                  // Incoming edges
                  var edgeList = edges.get();
                  var incoming = edgeList.filter(function(e) { return e.to === nodeId; });
                  var outgoing = edgeList.filter(function(e) { return e.from === nodeId; });

                  function renderEdges(arr, container, direction) {
                      var el = document.getElementById(container);
                      if (arr.length === 0) {
                          el.innerHTML = '<div class="no-edges">none</div>'; return;
                      }
                      el.innerHTML = arr.map(function(e) {
                          var other = direction === 'in' ? e.from : e.to;
                          var onode = nodes.get(other);
                          var oc = onode ? onode.color : '#888';
                          return '<div class="edge-item">' +
                              '<span class="arr">' + (direction === 'in' ? 'â†' : 'â†’') + '</span>' +
                              '<span><span class="enode" style="color:' + oc + '">' + other + '</span>' +
                              '<br><span class="elabel">' + (e.label || '') + '</span></span>' +
                              '</div>';
                      }).join('');
                  }

                  renderEdges(incoming, 'panel-incoming', 'in');
                  renderEdges(outgoing, 'panel-outgoing', 'out');

                  document.getElementById('detail-panel').classList.add('open');
              }

              function closePanel() {
                  document.getElementById('detail-panel').classList.remove('open');
              }

              function toggleLegend() {
                  legendOpen = !legendOpen;
                  document.getElementById('legend-body').style.display = legendOpen ? '' : 'none';
                  document.getElementById('legend-toggle').style.transform = legendOpen ? '' : 'rotate(-90deg)';

              // â”€â”€ Cluster filter â”€â”€
              function filterCluster(btn, cluster) {
                  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                  btn.classList.add('active');
                  var allNodeData = nodes.get();
                  var updates = allNodeData.map(function(n) {
                      var nodeColor = nodeColors[n.id] || n.color;
                      var match = cluster === 'all' || nodeColor === cluster;
                      return {
                          id: n.id,
                          opacity: match ? 1 : 0.12,
                          font: { color: match ? '#e0e0e0' : 'rgba(224,224,224,0.15)' }
                      };
                  });
                  nodes.update(updates);
              }

                  var term = this.value.toLowerCase().trim();
                  var allNodeData = nodes.get();
                  if (!term) {
                      // restore
                      var updates = allNodeData.map(function(n) {
                          return { id: n.id, opacity: 1, borderWidth: 2, font: { color: '#e0e0e0' } };
                      });
                      nodes.update(updates);
                      return;
                  }
                  var updates = allNodeData.map(function(n) {
                      var match = n.id.toLowerCase().indexOf(term) !== -1;
                      return {
                          id: n.id,
                          opacity: match ? 1 : 0.1,
                          borderWidth: match ? 5 : 2,
                          font: { color: match ? '#ffffff' : 'rgba(224,224,224,0.1)' }
                      };
                  });
                  nodes.update(updates);
              });
        </script>
    </body>
</html>
